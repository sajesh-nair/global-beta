name: Daily Momentum Data Sync

on:
  schedule:
    # Alarm 1: Triggers Mon-Fri at 15:45 UTC (9:15 PM IST) -> Perfect for Indian Market Close
    - cron: '45 15 * * 1-5'
    # Alarm 2: Triggers Mon-Fri at 23:30 UTC (5:00 AM IST next morning) -> Perfect for US/Global Close
    - cron: '30 23 * * 1-5'
  workflow_dispatch: # Allows manual trigger anytime

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          pip install -r requirements.txt

      # Dynamic Trigger Block for Nifty 200
      - name: Execute Nifty 200 Engine
        if: github.event.schedule == '45 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python api/cron/update-nifty.py

      # Dynamic Trigger Block for Global Matrix
      - name: Execute Global Matrix Engine
        if: github.event.schedule == '30 23 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python api/cron/update-etfs.py